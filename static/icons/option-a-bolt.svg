<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Option A: Lightning bolt on dark rounded square — matches the ⚡ in the titlebar -->
  <defs>
    <linearGradient id="bgA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e1e"/>
      <stop offset="100%" style="stop-color:#2d2d2d"/>
    </linearGradient>
    <linearGradient id="boltA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#007acc"/>
      <stop offset="100%" style="stop-color:#1a8ad4"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bgA)"/>
  <rect x="16" y="16" width="480" height="480" rx="80" fill="none" stroke="#3e3e42" stroke-width="4"/>
  <!-- Lightning bolt -->
  <polygon points="296,48 168,272 248,272 216,464 344,240 264,240" fill="url(#boltA)"/>
  <!-- Subtle glow -->
  <polygon points="296,48 168,272 248,272 216,464 344,240 264,240" fill="none" stroke="#007acc" stroke-width="2" opacity="0.5"/>
</svg>
